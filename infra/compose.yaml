services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "9092:9092"   # host access
    environment:
      # Configure listeners for both docker and host communication
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT

      # Settings required for KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091

      # Listener to use for broker-to-broker communication
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER

      # Required for a single node cluster
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    volumes:
      - kafka_data:/tmp/kraft-logs

  kafka-ui:
    image: kafbat/kafka-ui:main
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

  karapace-registry:
    image: ghcr.io/aiven-open/karapace:5.0.3
    container_name: karapace-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    entrypoint: ["python3", "-m", "karapace"]
    environment:
      KARAPACE_KARAPACE_REGISTRY: "true"
      KARAPACE_HOST: "0.0.0.0"
      KARAPACE_PORT: "8081"
      KARAPACE_ADVERTISED_HOSTNAME: "karapace-registry"
      KARAPACE_ADVERTISED_PROTOCOL: "http"
      KARAPACE_BOOTSTRAP_URI: "kafka:9093"
      KARAPACE_SECURITY_PROTOCOL: "PLAINTEXT"
      KARAPACE_TOPIC_NAME: "_schemas"
      KARAPACE_CLIENT_ID: "karapace-schema-registry-0"
      KARAPACE_GROUP_ID: "karapace-schema-registry"
      KARAPACE_MASTER_ELIGIBILITY: "true"
      KARAPACE_LOG_LEVEL: "INFO"

  karapace-rest:
    image: ghcr.io/aiven-open/karapace:5.0.3
    container_name: karapace-rest
    depends_on:
      - kafka
      - karapace-registry
    ports:
      - "8082:8082"
    entrypoint: ["python3", "-m", "karapace.kafka_rest_apis"]
    environment:
      KARAPACE_KARAPACE_REST: "true"
      KARAPACE_HOST: "0.0.0.0"
      KARAPACE_PORT: "8082"
      KARAPACE_ADVERTISED_HOSTNAME: "karapace-rest"
      KARAPACE_ADVERTISED_PROTOCOL: "http"
      KARAPACE_BOOTSTRAP_URI: "kafka:9093"
      KARAPACE_SECURITY_PROTOCOL: "PLAINTEXT"
      KARAPACE_REGISTRY_SCHEME: "http"
      KARAPACE_REGISTRY_HOST: "karapace-registry"
      KARAPACE_REGISTRY_PORT: "8081"
      KARAPACE_LOG_LEVEL: "INFO"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_db
    # Force Apache-only feature access
    command: ["postgres", "-c", "timescaledb.license=apache"]
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescaledb/initdb:/docker-entrypoint-initdb.d

  valkey:
    image: valkey/valkey:8.1-alpine
    container_name: valkey
    ports:
      - "6379:6379"

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.latest
    working_dir: /usr/app
    volumes:
      - ../analytics_dbt:/usr/app
      - ../analytics_dbt/.dbt:/root/.dbt
    environment:
      DBT_PROFILES_DIR: /root/.dbt
    depends_on:
      - timescaledb

  spark-processor:
    build:
      context: ../spark_processor
    container_name: spark-processor
    user: "0"
    depends_on:
      - kafka
      - timescaledb
      - karapace-registry
      - valkey
    restart: unless-stopped

    environment:
      HOME: /tmp

      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      KAFKA_TOPIC: ticks.raw.crypto.avro.v1
      CHECKPOINT_DIR: /checkpoints/candles_crypto_1m_run_2026_02_09_b
      STARTING_OFFSETS: latest
      SCHEMA_REGISTRY_URL: http://host.docker.internal:8081
      SCHEMA_SUBJECT: ticks.raw.crypto.avro.v1-value


      WATERMARK_DELAY: 2 minutes
      WINDOW_DURATION: 1 minute
      TRIGGER_INTERVAL: 10 seconds
      

      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_DB: stock_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_TABLE: market_candles_1m

      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PREFIX: latest:candle:crypto:1m

    volumes:
      - spark_checkpoints:/checkpoints
      - spark_ivy:/tmp/.ivy2

    entrypoint: ["/bin/bash", "-lc"]

    command:
      - |
          set -euo pipefail
          mkdir -p /checkpoints/candles_1m
          chmod -R 777 /checkpoints

          exec /opt/spark/bin/spark-submit \
            --master "local[*]" \
            --conf "spark.jars.ivy=/tmp/.ivy2" \
            --packages "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.7,org.apache.spark:spark-avro_2.12:3.5.7" \
            /opt/spark-app/main_avro.py



volumes:
  kafka_data:
  timescale_data:
  spark_checkpoints:
  spark_ivy:

